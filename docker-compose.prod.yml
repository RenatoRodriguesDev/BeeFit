services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile-fpm
    container_name: beeFit_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: beeFit_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  reverb:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile-fpm
    container_name: beeFit_reverb
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine

volumes:
  mysql_data: